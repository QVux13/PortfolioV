{% extends 'core/base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<style>
    .home-section {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 5rem 4rem;
        position: relative;
        overflow: hidden;
    }
    
    .home-content {
        text-align: center;
        max-width: 950px;
        position: relative;
        z-index: 2;
    }
    
    .greeting {
        font-size: 1.3rem;
        color: #14b8a6;
        font-weight: 600;
        margin-bottom: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        opacity: 0;
        animation: fadeInUp 0.8s ease forwards;
    }
    
    .home-title {
        font-size: 4.2rem;
        font-weight: 700;
        color: white;
        margin-bottom: 1.5rem;
        line-height: 1.15;
        letter-spacing: -0.03em;
        opacity: 0;
        animation: fadeInUp 0.8s ease 0.2s forwards;
    }
    
    .home-title span {
        background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .home-subtitle {
        font-size: 2rem;
        color: #d1d5db;
        font-weight: 400;
        margin-bottom: 2.5rem;
        opacity: 0;
        animation: fadeInUp 0.8s ease 0.4s forwards;
    }
    
    .home-description {
        font-size: 1.15rem;
        color: #9ca3af;
        max-width: 650px;
        margin: 0 auto 3rem;
        line-height: 1.8;
        opacity: 0;
        animation: fadeInUp 0.8s ease 0.6s forwards;
    }
    
    .home-buttons {
        display: flex;
        gap: 1.2rem;
        justify-content: center;
        opacity: 0;
        animation: fadeInUp 0.8s ease 0.8s forwards;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
        color: white;
        padding: 1rem 2.8rem;
        border-radius: 3rem;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.05rem;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        box-shadow: 0 4px 15px rgba(20, 184, 166, 0.4);
        position: relative;
        overflow: hidden;
    }
    
    .btn-primary::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.5s;
    }
    
    .btn-primary:hover::before {
        left: 100%;
    }
    
    .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(20, 184, 166, 0.5);
    }
    
    .btn-secondary {
        border: 2px solid rgba(20, 184, 166, 0.5);
        color: #14b8a6;
        background: rgba(20, 184, 166, 0.05);
        padding: 1rem 2.8rem;
        border-radius: 3rem;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.05rem;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        backdrop-filter: blur(10px);
    }
    
    .btn-secondary:hover {
        background: #14b8a6;
        border-color: #14b8a6;
        color: white;
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(20, 184, 166, 0.3);
    }
    
    .floating-elements {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 1;
    }
    
    .float-circle {
        position: absolute;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(20, 184, 166, 0.1), rgba(6, 182, 212, 0.1));
        animation: float 6s ease-in-out infinite;
    }
    
    .float-circle:nth-child(1) {
        width: 80px;
        height: 80px;
        top: 20%;
        left: 10%;
        animation-delay: 0s;
    }
    
    .float-circle:nth-child(2) {
        width: 120px;
        height: 120px;
        top: 60%;
        right: 15%;
        animation-delay: 2s;
    }
    
    .float-circle:nth-child(3) {
        width: 60px;
        height: 60px;
        bottom: 20%;
        left: 20%;
        animation-delay: 4s;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    @keyframes float {
        0%, 100% {
            transform: translateY(0) rotate(0deg);
        }
        50% {
            transform: translateY(-20px) rotate(180deg);
        }
    }
    
    @media (max-width: 768px) {
        .home-section { padding: 3rem 2rem; }
        .greeting { font-size: 1rem; }
        .home-title { font-size: 2.5rem; }
        .home-subtitle { font-size: 1.3rem; }
        .home-description { font-size: 0.95rem; }
        .home-buttons { 
            flex-direction: column;
            gap: 1rem;
        }
        .btn-primary, .btn-secondary {
            width: 100%;
            justify-content: center;
            padding: 0.85rem 2rem;
        }
        .float-circle { display: none; }
    }
    
    @media (min-width: 769px) and (max-width: 1024px) {
        .home-section { padding: 3rem; }
        .home-title { font-size: 3rem; }
        .home-subtitle { font-size: 1.5rem; }
        .home-description { font-size: 1rem; max-width: 500px; }
        .btn-primary, .btn-secondary {
            padding: 0.85rem 2rem;
            font-size: 0.95rem;
        }
    }
    
    @media (max-width: 480px) {
        .home-section { padding: 2rem 1.2rem; padding-bottom: 4rem; }
        .greeting { font-size: 0.85rem; letter-spacing: 0.1em; }
        .home-title { font-size: 2rem; margin-bottom: 1rem; }
        .home-subtitle { font-size: 1.1rem; margin-bottom: 1.5rem; }
        .home-description { font-size: 0.88rem; margin-bottom: 2rem; line-height: 1.7; }
        .btn-primary, .btn-secondary {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
        }
    }
</style>

<section class="home-section">
    <div class="floating-elements">
        <div class="float-circle"></div>
        <div class="float-circle"></div>
        <div class="float-circle"></div>
    </div>
    
    <div class="home-content">
        <div class="greeting">Welcome to my portfolio</div>
        
        <h1 class="home-title">
            Hi, I'm <span>{{ profile.name }}</span>
        </h1>
        
        <p class="home-subtitle">
            {{ profile.title }}
        </p>
        
        <p class="home-description">
            {{ profile.bio }}
        </p>
        
        <div class="home-buttons">
            <a href="/portfolio/" class="btn-primary">
                <i class="fas fa-briefcase"></i> View My Work
            </a>
            <a href="/contact/" class="btn-secondary">
                <i class="fas fa-envelope"></i> Get In Touch
            </a>
        </div>
    </div>
</section>
{% endblock %}
